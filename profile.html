<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Nexora Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="has-navbar">

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <button onclick="goHome()">Home</button>
    </div>

    <div class="nav-right">
        <button onclick="toggleTheme()">Toggle Theme</button>
        <button onclick="logout()">Logout</button>
    </div>

</div>


<!-- BACKGROUND WAVES -->
<div class="wave-container">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
</div>


<!-- PROFILE SECTION -->
<div class="container profile-box">

    <h2>My Profile 👤</h2>
    <img id="profileImage" src="" width="120" style="border-radius:50%; margin-bottom:10px;">

<input type="file" id="uploadImage">

<button onclick="uploadProfileImage()">Upload Photo</button> 

    <h3 id="profileUser"></h3>

    <input type="text" id="editUsername" placeholder="New Username">

    <input type="password" id="editPassword" placeholder="New Password">

    <button onclick="updateProfile()">Save Changes</button>

    <button onclick="deleteAccount()" class="delete-btn">
        Delete Account
    </button>

</div>


<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Nexora Dashboard | Developed by Rakesh Kumar</p>
</footer>


<script src="script.js"></script>

</body>
</html>
