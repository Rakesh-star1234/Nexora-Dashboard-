<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Nexora - Reset Password</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- WAVES BACKGROUND -->
<div class="wave-container">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div> 
</div>

<!-- RESET BOX -->
<div class="container">

    <h2>Reset Password 🔑</h2>

    <input type="text" id="resetUsername" placeholder="Enter Username">

    <input type="password" id="newPassword" placeholder="Enter New Password">

    <button onclick="resetPassword()">Reset Password</button>

    <button onclick="goLogin()">Back to Login</button>

    <p id="resetMessage"></p>

</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Nexora Dashboard | Developed by Rakesh Kumar</p>
</footer>

<script src="script.js"></script>

</body>
</html>
