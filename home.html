<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Nexora Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="has-navbar">

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <button onclick="goHome()">Home</button>
        <button onclick="goProfile()">Profile</button>
    </div>

    <div class="nav-right">
        <button onclick="toggleTheme()">Toggle Theme</button>
        <button onclick="logout()">Logout</button>
    </div>

</div>


<!-- BACKGROUND WAVES -->
<div class="wave-container">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
</div>


<!-- DASHBOARD -->
<div class="dashboard">
    <img id="homeProfileImage" width="120" style="border-radius:50%; margin-bottom:20px;">

    <h1>Welcome, <span id="welcomeUser"></span> 🔥</h1>

    <div class="card-container">

        <div class="card">
            <h3>👤 Username</h3>
            <p id="cardUsername"></p>
        </div>

        <div class="card">
            <h3>🔐 Account Status</h3>
            <p>Active</p>
        </div>

        <div class="card">
            <h3>🌙 Current Theme</h3>
            <p id="currentTheme"></p>
        </div>

        <div class="card">
            <h3>⏱ Last Login</h3>
            <p id="lastLogin"></p>
        </div>

        <div class="card">
            <h3>📊 Total Logins</h3>
            <p id="loginCount">0</p>
        </div>

    </div>

</div>


<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Nexora Dashboard | Developed by Rakesh Kumar</p>
</footer>


<!-- JS -->
<script src="script.js"></script>

</body>
</html>
