<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Nexora Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="has-navbar">

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="nav-left">
            <button onclick="goHome()">Home</button>
        </div>

        <div class="nav-right">
            <button onclick="toggleTheme()">Toggle Theme</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- WAVES -->
    <div class="wave-container">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- ADMIN CONTENT -->
    <div class="dashboard">

        <h1>Admin Panel 👑</h1>
        <h3>All Registered Users</h3>

<input type="text" id="searchUser" placeholder="Search User..." onkeyup="searchUser()">

<div class="card-container"> 
<div class="card">
<h3>👥 Users List</h3> 
<ul id="userList" style="list-style:none; padding:0;"></ul>
</div>
</div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 Nexora Dashboard | Developed by Rakesh Kumar</p>
    </footer>

<script src="script.js"></script>

</body>
</html>
